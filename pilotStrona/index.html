<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot YT</title>
    <style>
        body {
            background-color: #0b132b;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        button {
            background-color: #7b2cbf;
            color: white;
            border: none;
            padding: 22px;
            margin: 12px;
            width: 85%;
            max-width: 400px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(123, 44, 191, 0.4);
            transition: all 0.15s ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }


        button:active {
            background-color: #5a189a;
            transform: scale(0.96);
            box-shadow: 0 2px 10px rgba(123, 44, 191, 0.6);
        }
    </style>
</head>
<body>

<button onclick="sendCommand('toggle_play')">⏯ Play / Pause</button>
<button onclick="sendCommand('vol_up')">🔊 Głośniej</button>
<button onclick="sendCommand('vol_down')">🔉 Ciszej</button>
<button onclick="sendCommand('backward')">⏪ Przewiń -10s</button>
<button onclick="sendCommand('forward')">⏩ Przewiń +10s</button>

<script>
    const socket = new WebSocket('ws://192.168.0.132:8080');

    function sendCommand(cmd) {
        if (socket.readyState === WebSocket.OPEN) {
            socket.send(cmd);
        } else {
            alert("No conection with a sever");
        }
    }
</script>
</body>
</html>
